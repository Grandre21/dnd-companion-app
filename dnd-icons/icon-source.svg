<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#2a1832"/>
      <stop offset="60%" stop-color="#1a0e1f"/>
      <stop offset="100%" stop-color="#0d0710"/>
    </radialGradient>

    <linearGradient id="goldStroke" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0d4a0"/>
      <stop offset="50%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#8b6232"/>
    </linearGradient>

    <!-- Sfumature per le 6 facce (alto-sx più chiara, basso-dx più scura, etc.) -->
    <linearGradient id="faceTopLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6b4d2a"/>
      <stop offset="100%" stop-color="#4a3520"/>
    </linearGradient>
    <linearGradient id="faceTopRight" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6b4d2a"/>
      <stop offset="100%" stop-color="#4a3520"/>
    </linearGradient>
    <linearGradient id="faceMid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a3520"/>
      <stop offset="100%" stop-color="#2e2010"/>
    </linearGradient>
    <linearGradient id="faceBottom" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2e2010"/>
      <stop offset="100%" stop-color="#1d140a"/>
    </linearGradient>

    <linearGradient id="topFaceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8a6235"/>
      <stop offset="100%" stop-color="#5a4020"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="7.68"/>
      <feOffset dx="0" dy="4.096" result="offsetblur"/>
      <feFlood flood-color="#000" flood-opacity="0.6"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Sfondo arrotondato -->
  <rect x="0" y="0" width="512" height="512" rx="92.16" ry="92.16" fill="url(#bgGrad)"/>

  <!-- Bordo dorato esterno sottile -->
  <rect x="10.24" y="10.24" width="491.52" height="491.52"
        rx="81.92" ry="81.92"
        fill="none" stroke="#5a3f20" stroke-width="3.072" opacity="0.5"/>

  <!-- Le 6 facce del d20 con sfumature differenti -->
  <polygon points="256.00,51.20 433.36,153.60 256.00,256.00" fill="url(#faceTopLeft)" stroke="#b88a55" stroke-width="2.56" stroke-linejoin="miter"/>
  <polygon points="433.36,153.60 433.36,358.40 256.00,256.00" fill="url(#faceTopRight)" stroke="#b88a55" stroke-width="2.56" stroke-linejoin="miter"/>
  <polygon points="433.36,358.40 256.00,460.80 256.00,256.00" fill="url(#faceMid)" stroke="#b88a55" stroke-width="2.56" stroke-linejoin="miter"/>
  <polygon points="256.00,460.80 78.64,358.40 256.00,256.00" fill="url(#faceBottom)" stroke="#b88a55" stroke-width="2.56" stroke-linejoin="miter"/>
  <polygon points="78.64,358.40 78.64,153.60 256.00,256.00" fill="url(#faceMid)" stroke="#b88a55" stroke-width="2.56" stroke-linejoin="miter"/>
  <polygon points="78.64,153.60 256.00,51.20 256.00,256.00" fill="url(#faceTopLeft)" stroke="#b88a55" stroke-width="2.56" stroke-linejoin="miter"/>
  <polygon points="256.00,51.20 433.36,153.60 433.36,358.40 256.00,460.80 78.64,358.40 78.64,153.60" fill="none" stroke="url(#goldStroke)" stroke-width="11.264" stroke-linejoin="miter" filter="url(#shadow)"/>
  <polygon points="256.00,51.20 344.68,194.56 167.32,194.56" fill="url(#topFaceGrad)" stroke="#f0d4a0" stroke-width="6.144" stroke-linejoin="miter"/>
  <text x="256.00" y="178.11"
        font-family="DejaVu Serif, Georgia, 'Times New Roman', serif"
        font-size="87.04"
        font-weight="bold"
        fill="url(#goldStroke)"
        stroke="#0d0710"
        stroke-width="2.048"
        text-anchor="middle"
        paint-order="stroke fill">20</text>
  <path d="M 78.64,153.60
                    L 256.00,51.20
                    L 433.36,153.60"
              fill="none" stroke="#f0d4a0" stroke-width="6.144" stroke-linecap="round" opacity="0.75"/>
</svg>