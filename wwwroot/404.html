<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&amp;D Companion</title>
    <script type="text/javascript">
        // Single Page Apps for GitHub Pages
        // https://github.com/rafgraph/spa-github-pages
        //
        // GitHub Pages serves 404.html for any unknown path. This script takes
        // the deep-link URL, rewrites it as a query string, and redirects to
        // the SPA's index.html. index.html has a counterpart script that
        // restores the original path via history.replaceState.
        //
        // pathSegmentsToKeep = 1 keeps "/dnd-companion-app" as the base and
        // encodes everything after it. Change this if the repo name changes.
        var pathSegmentsToKeep = 1;

        var l = window.location;
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
            l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
    </script>
</head>

<body>
</body>

</html>
