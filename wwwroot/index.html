<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <!--
      Content-Security-Policy. Su GitHub Pages è ottenibile SOLO via <meta> (niente header HTTP), perciò
      frame-ancestors/report-uri sono ignorati (no anti-clickjacking qui). script-src usa 'unsafe-inline'
      perché .NET inietta un <script type="importmap"> auto-generato il cui contenuto (fingerprint degli asset
      + integrity) CAMBIA ad ogni build: un hash fisso si romperebbe ai rilasci successivi. Il valore di
      sicurezza resta nelle direttive restrittive: connect-src (solo Supabase) blocca l'esfiltrazione dati,
      object-src 'none', base-uri 'self', default-src 'self'. L'app non rende mai HTML grezzo (Blazor
      auto-escapa) → rischio di script inline iniettati teorico. 'wasm-unsafe-eval' è obbligatorio per Blazor WASM.
      connect-src include localhost (ws/wss/http) SOLO per gli strumenti di sviluppo (hot-reload + Browser Link di
      Visual Studio): in produzione sono voci inerti (nessuno si connette al proprio localhost).
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https://tbgjwtfmijrcmeracfzh.supabase.co ws://localhost:* wss://localhost:* http://localhost:*; object-src 'none'; base-uri 'self'; manifest-src 'self'; worker-src 'self'" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a0e1f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="D&amp;D Companion" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>D&amp;D Companion</title>
    <base href="/" />
    <script type="text/javascript">
        // Single Page Apps for GitHub Pages - path restore
        // https://github.com/rafgraph/spa-github-pages
        (function (l) {
            if (l.search[1] === '/') {
                var decoded = l.search.slice(1).split('&').map(function (s) {
                    return s.replace(/~and~/g, '&');
                }).join('?');
                window.history.replaceState(null, null,
                    l.pathname.slice(0, -1) + decoded + l.hash
                );
            }
        }(window.location));
    </script>
    <link rel="preload" id="webassembly" />
    <style>
        /* Critical: evita il flash bianco prima del caricamento di app.css/Blazor */
        html, body { background-color: #1a0e1f; margin: 0; }
        #app { min-height: 100vh; }
    </style>
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />

    <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>
        // Aggiornamento PWA on-demand: rileva un nuovo service worker in "waiting" e lo
        // segnala a Blazor (window.pwaUpdate.registerCallback). Il banner mostra "Aggiorna";
        // al click si forza skipWaiting e si ricarica via 'controllerchange'.
        // NB: path RELATIVO 'service-worker.js' -> rispetta il <base href> (in prod /dnd-companion-app/).
        (function () {
            if (!('serviceWorker' in navigator)) return;

            let swRegistration = null;       // ServiceWorkerRegistration una volta pronta
            let dotNetRef = null;            // DotNetObjectReference del PwaUpdateService
            let updatePending = false;       // true se c'è un SW aggiornato in attesa
            let refreshing = false;          // guardia anti-doppio-reload
            let userTriggeredUpdate = false; // true SOLO dopo click su "Aggiorna": gate del reload

            window.pwaUpdate = {
                // Blazor registra qui il proprio callback. Se l'update è stato rilevato
                // PRIMA che Blazor fosse pronto (updatePending), notifica subito.
                registerCallback: function (ref) {
                    dotNetRef = ref;
                    if (updatePending) notifyBlazor();
                },
                // Click su "Aggiorna": chiede al SW in attesa di attivarsi subito.
                // Solo qui abilitiamo il reload (userTriggeredUpdate), così 'controllerchange'
                // ricarica esclusivamente come conseguenza di QUESTA azione utente.
                applyUpdate: function () {
                    userTriggeredUpdate = true;
                    if (swRegistration && swRegistration.waiting) {
                        swRegistration.waiting.postMessage({ type: 'SKIP_WAITING' });
                    } else {
                        // Nessun worker in attesa (caso limite): fallback a reload semplice.
                        window.location.reload();
                    }
                }
            };

            function notifyBlazor() {
                if (dotNetRef) dotNetRef.invokeMethodAsync('NotifyUpdateAvailable');
            }

            // controller != null => esiste già una versione attiva => questo è un UPDATE,
            // non la prima installazione (in tal caso NON notifichiamo, niente banner).
            function maybeNotifyUpdate() {
                if (navigator.serviceWorker.controller) {
                    updatePending = true;
                    notifyBlazor();
                }
            }

            // Reload SOLO se l'utente ha cliccato "Aggiorna" (skipWaiting volontario).
            // Se il nuovo SW si attivasse da solo (es. il vecchio perde tutti i client),
            // NON ricarichiamo a sorpresa: l'utente continua a vedere il banner e decide.
            navigator.serviceWorker.addEventListener('controllerchange', function () {
                if (!userTriggeredUpdate) return;
                if (refreshing) return;
                refreshing = true;
                window.location.reload();
            });

            // Traccia un worker in installazione: notifica quando raggiunge 'installed'
            // (a quel punto è in waiting, dato che onInstall non chiama skipWaiting).
            function trackInstalling(worker) {
                if (!worker) return;
                if (worker.state === 'installed') { maybeNotifyUpdate(); return; }
                worker.addEventListener('statechange', function () {
                    if (worker.state === 'installed') maybeNotifyUpdate();
                });
            }

            navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' })
                .then(function (registration) {
                    swRegistration = registration;

                    // Caso A: un SW aggiornato è GIÀ in waiting al load (rilevato in una
                    // sessione precedente). 'updatefound' non riscatterà: controlliamo subito.
                    if (registration.waiting) maybeNotifyUpdate();

                    // Caso B: un SW è GIÀ in 'installing' quando register() risolve. L'evento
                    // 'updatefound' potrebbe essere già scattato (race), quindi lo tracciamo ora.
                    if (registration.installing) trackInstalling(registration.installing);

                    // Caso C: un nuovo SW viene trovato più avanti durante questa sessione.
                    registration.addEventListener('updatefound', function () {
                        trackInstalling(registration.installing);
                    });

                    // Il router Blazor è client-side e NON triggera l'update check del browser.
                    // Nessun timer/polling: controlliamo solo quando la finestra torna in focus
                    // (evento, non timer). update() si limita a rilevare/installare il nuovo SW
                    // (-> waiting): non attiva mai nulla, quindi non provoca reload.
                    window.addEventListener('focus', function () {
                        if (swRegistration) swRegistration.update().catch(function () { });
                    });
                })
                .catch(function (error) {
                    console.error('Registrazione service worker fallita:', error);
                });
        })();
    </script>
    <script>
        // Riparazione app per cache PWA corrotta (caso tipico: Firefox). Quando il service worker
        // serve asset/risposte stantii l'app mostra un errore di connessione al DB. repairApp()
        // deregistra il SW e svuota tutte le Cache API, poi ricarica. NON tocca localStorage, così
        // la sessione Google (Gotrue) resta valida e l'utente non deve rifare il login.
        window.repairApp = async function () {
            try {
                if ('serviceWorker' in navigator) {
                    const regs = await navigator.serviceWorker.getRegistrations();
                    await Promise.all(regs.map(function (r) { return r.unregister(); }));
                }
                if ('caches' in window) {
                    const keys = await caches.keys();
                    await Promise.all(keys.map(function (k) { return caches.delete(k); }));
                }
            } catch (e) {
                console.error('repairApp fallita:', e);
            } finally {
                window.location.reload();
            }
        };
    </script>
</body>

</html>
